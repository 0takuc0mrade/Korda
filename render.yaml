services:
  - type: web
    name: korda-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: COGNEE_API_KEY
        sync: false
      - key: COGNEE_SERVICE_URL
        sync: false
      - key: GRAPH_PROMPT_PATH
        value: custom_graph_prompt.txt
